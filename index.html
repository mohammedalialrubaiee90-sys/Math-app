<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--hint); font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        .result-box { background: rgba(0,0,0,0.05); padding: 20px; border-radius: 12px; min-height: 50px; font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 20px; border: 2px dashed var(--btn); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        button { padding: 15px; border-radius: 8px; border: none; background: var(--btn); color: var(--btn-text); font-size: 1rem; cursor: pointer; }
        button.op { background: #f39c12; }
    </style>
</head>
<body>
    <div class="container">
        <h3>مساعد الرياضيات الذكي 🧮</h3>
        <div id="display" class="result-box">0</div>
        <input type="text" id="input" placeholder="اكتب المسألة هنا..." readonly>
        
        <div class="grid">
            <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button class="op" onclick="add('/')">/</button>
            <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button class="op" onclick="add('*')">×</button>
            <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button class="op" onclick="add('-')">-</button>
            <button onclick="clearAll()" style="background:#e74c3c">C</button><button onclick="add('0')">0</button><button onclick="calculate()" style="background:#2ecc71">=</button><button class="op" onclick="add('+')">+</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const inputField = document.getElementById('input');
        const display = document.getElementById('display');

        function add(val) { inputField.value += val; }
        function clearAll() { inputField.value = ''; display.innerText = '0'; }
        function calculate() {
            try {
                const res = eval(inputField.value);
                display.innerText = res;
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                display.innerText = "خطأ!";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>
</body>
</html>
