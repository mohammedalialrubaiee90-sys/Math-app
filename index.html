<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Visualizer Pro - 3D Edition</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot@1/dist/function-plot.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; --glass: rgba(255, 255, 255, 0.08); }
        body {
            margin: 0; padding: 0;
            background: #0f0c29; /* لون أساسي غامق خلف المجسمات */
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير على الخلفية */
        }
        
        /* حاوية الخلفية ثلاثية الأبعاد */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; /* لجعلها خلف المحتوى المحتوى */
        }

        .container { width: 95%; max-width: 500px; padding: 15px; box-sizing: border-box; z-index: 1; /* فوق الخلفية */ }
        .header { text-align: center; margin-bottom: 15px; }
        .card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #plot { 
            width: 100%; height: 280px; background: rgba(255,255,255,0.9); 
            border-radius: 12px; margin: 15px 0;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.15); color: #fff; font-size: 1.2rem;
            text-align: left; direction: ltr; margin-bottom: 10px; outline: none;
        }
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .keyboard button {
            padding: 12px 5px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.08); color: white; font-size: 0.9rem;
            cursor: pointer; transition: 0.2s;
        }
        .keyboard button:active { background: var(--primary); transform: scale(0.9); }
        .btn-draw { background: #2ecc71 !important; grid-column: span 2; font-weight: bold; }
        .btn-clear { background: #e74c3c !important; }
        
        .footer {
            margin-top: auto; padding: 20px; text-align: center;
            font-size: 0.8rem; background: rgba(0,0,0,0.5); width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1); line-height: 1.6;
            box-sizing: border-box; z-index: 1;
        }
        .footer b { color: #a29bfe; }
        .names-box { margin-top: 5px; padding: 5px; border-radius: 8px; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header animate__animated animate__fadeInDown">
            <h3 style="margin:0;">محلل الدوال الذكي 📈 <span style="font-size:0.7em;">(3D)</span></h3>
            <small>ثانوية الذرى للمتميزين</small>
        </div>

        <div class="card animate__animated animate__zoomIn">
            <input type="text" id="equation" value="x^2" readonly>
            <div id="plot"></div>
            
            <div class="keyboard">
                <button onclick="press('sin(')">sin</button><button onclick="press('cos(')">cos</button><button onclick="press('tan(')">tan</button><button onclick="press('log(')">log</button><button onclick="press('exp(')">exp</button>
                <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('/')">/</button><button onclick="press('(')">(</button>
                <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('*')">×</button><button onclick="press(')')">)</button>
                <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('-')">-</button><button onclick="press('^')">^</button>
                <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="press('x')">x</button><button onclick="press('+')">+</button><button onclick="backspace()">⌫</button>
                <button class="btn-clear" onclick="clearAll()">C</button><button class="btn-draw" onclick="draw()">رسم الدالة</button><button onclick="press('sqrt(')">√</button><button onclick="press('PI')">π</button>
            </div>
        </div>
    </div>

    <div class="footer animate__animated animate__fadeInUp">
        <p style="margin: 0;">جميع الحقوق محفوظة © لـ <b>ثانوية الذرى للمتميزين</b></p>
        <div class="names-box">
            <p style="margin: 5px 0;">تمت البرمجة بواسطة الطلاب:</p>
            <p style="margin: 2px 0;"><b>محمدعلي براء الربيعي</b> & <b>محمدرضا ضياء حمادي</b></p>
        </div>
        <p style="margin: 10px 0 0 0;">بإشراف الأساتذة:<br>أ. محمد سمير | أ. محمد زكي | د. علي خالد</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. إعداد الخلفية ثلاثية الأبعاد (Three.js)
        function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0f0c29, 20, 100); // إضافة ضباب لزيادة العمق

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // إنشاء مجسم: شبكة أرضية (Wireframe Plan) لتبدو كفضاء معلوماتي
            const geometry = new THREE.PlaneGeometry(100, 100, 20, 20);
            const material = new THREE.MeshBasicMaterial({
                color: 0x6c5ce7, // نفس لون التطبيق الأساسي
                wireframe: true,
                transparent: true,
                opacity: 0.15 // شفافة جداً لتبدو فخمة وغير مزعجة
            });
            const plane = new THREE.Mesh(geometry, material);
            plane.rotation.x = -Math.PI / 2; // جعلها أفقية
            plane.position.y = -10; // إنزالها للأسفل قليلاً
            scene.add(plane);

            // إضافة بعض النقاط المضيئة كنجوم
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.1});
            const starsCoords = [];
            for (let i = 0; i < 500; i++) {
                starsCoords.push((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsCoords, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // دالة التحريك (Animation)
            function animate() {
                requestAnimationFrame(animate);
                
                // تحريك الشبكة ببطء شديد
                plane.rotation.z += 0.001; 
                stars.rotation.y += 0.0005;

                renderer.render(scene, camera);
            }

            // التعامل مع تغيير حجم الشاشة
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        // 2. وظائف الآلة الحاسبة والرسم (D3.js)
        function press(val) { document.getElementById('equation').value += val; }
        function clearAll() { document.getElementById('equation').value = ''; }
        function backspace() {
            let ev = document.getElementById('equation').value;
            document.getElementById('equation').value = ev.substring(0, ev.length - 1);
        }

        function draw() {
            const eq = document.getElementById('equation').value;
            try {
                functionPlot({
                    target: '#plot',
                    width: document.getElementById('plot').clientWidth,
                    height: 280,
                    grid: true,
                    xAxis: { domain: [-10, 10] },
                    yAxis: { domain: [-10, 10] },
                    data: [{ fn: eq, color: '#6c5ce7', sampler: 'builtIn' }]
                });
                tg.HapticFeedback.impactOccurred('medium');
            } catch (err) { alert("تأكد من كتابة الدالة بشكل صحيح."); }
        }

        // التشغيل عند الفتح
        window.onload = () => {
            init3DBackground(); // تشغيل الخلفية الفخمة أولاً
            draw();             // رسم الدالة الافتراضية
        };
        window.onresize = draw;
    </script>
</body>
</html>
