<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Visualizer Pro - Al-Thura School</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot@1/dist/function-plot.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; --glass: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 95%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 15px; }
        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #plot { 
            width: 100%; height: 280px; background: #fff; 
            border-radius: 12px; margin: 15px 0;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.2); color: #fff; font-size: 1.2rem;
            text-align: left; direction: ltr; margin-bottom: 10px; outline: none;
        }
        /* لوحة المفاتيح الرياضية */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .keyboard button {
            padding: 12px 5px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.1); color: white; font-size: 0.9rem;
            cursor: pointer; transition: 0.2s;
        }
        .keyboard button:active { background: var(--primary); transform: scale(0.9); }
        .btn-draw { background: #2ecc71 !important; grid-column: span 2; font-weight: bold; }
        .btn-clear { background: #e74c3c !important; }
        
        .footer {
            margin-top: 20px; padding: 15px; text-align: center;
            font-size: 0.75rem; background: rgba(0,0,0,0.3); width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1); line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header animate__animated animate__fadeInDown">
            <h3 style="margin:0;">محلل الدوال الذكي 📈</h3>
            <small>ثانوية الذرى للمتميزين</small>
        </div>

        <div class="card animate__animated animate__zoomIn">
            <input type="text" id="equation" value="x^2" readonly>
            <div id="plot"></div>
            
            <div class="keyboard">
                <button onclick="press('sin(')">sin</button>
                <button onclick="press('cos(')">cos</button>
                <button onclick="press('tan(')">tan</button>
                <button onclick="press('log(')">log</button>
                <button onclick="press('exp(')">exp</button>
                
                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>
                <button onclick="press('/')">/</button>
                <button onclick="press('(')">(</button>
                
                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>
                <button onclick="press('*')">×</button>
                <button onclick="press(')')">)</button>
                
                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>
                <button onclick="press('-')">-</button>
                <button onclick="press('^')">^</button>
                
                <button onclick="press('0')">0</button>
                <button onclick="press('.')">.</button>
                <button onclick="press('x')">x</button>
                <button onclick="press('+')">+</button>
                <button onclick="backspace()">⌫</button>
                
                <button class="btn-clear" onclick="clearAll()">C</button>
                <button class="btn-draw" onclick="draw()">رسم المحاور والدالة</button>
                <button onclick="press('sqrt(')">√</button>
                <button onclick="press('PI')">π</button>
            </div>
        </div>
    </div>

    <div class="footer animate__animated animate__fadeInUp">
        <p>جميع الحقوق محفوظة © لـ <b>ثانوية الذرى للمتميزين</b></p>
        <p>برمجة الطالب: <b>محمد علي براء</b></p>
        <p>بإشراف: أ. محمد سمير | أ. محمد زكي | د. علي خالد</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function press(val) {
            document.getElementById('equation').value += val;
        }

        function clearAll() {
            document.getElementById('equation').value = '';
        }

        function backspace() {
            let ev = document.getElementById('equation').value;
            document.getElementById('equation').value = ev.substring(0, ev.length - 1);
        }

        function draw() {
            const eq = document.getElementById('equation').value;
            try {
                functionPlot({
                    target: '#plot',
                    width: document.getElementById('plot').clientWidth,
                    height: 280,
                    disableZoom: false,
                    grid: true, // تفعيل الشبكة والتدريجات
                    xAxis: { label: 'محور X', domain: [-10, 10] },
                    yAxis: { label: 'محور Y', domain: [-10, 10] },
                    data: [{
                        fn: eq,
                        color: '#6c5ce7',
                        graphType: 'polyline',
                        sampler: 'builtIn' // دقة عالية
                    }]
                });
                tg.HapticFeedback.impactOccurred('medium');
            } catch (err) {
                alert("يرجى كتابة الدالة بشكل صحيح. تأكد من إغلاق الأقواس.");
            }
        }

        window.onload = draw;
        window.onresize = draw;
    </script>
</body>
</html>
