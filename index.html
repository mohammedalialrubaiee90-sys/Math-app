<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Visualizer - Al-Thura School</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot@1/dist/function-plot.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --primary: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header { margin-top: 30px; text-align: center; padding: 10px; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            margin: 20px 0;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.15); color: white;
            font-size: 1.1rem; outline: none; box-sizing: border-box;
            text-align: center; margin-top: 10px;
        }
        button {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 10px;
            border: none; background: var(--primary); color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        button:active { transform: scale(0.95); }
        #plot {
            width: 100%; height: 300px; background: white;
            border-radius: 15px; margin-top: 20px;
        }
        .footer {
            margin-top: auto; width: 100%; padding: 20px 0;
            background: rgba(0,0,0,0.3); text-align: center;
            font-size: 0.8rem; color: rgba(255,255,255,0.7);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer b { color: #a29bfe; }
    </style>
</head>
<body>

    <div class="header animate__animated animate__fadeInDown">
        <h2 style="margin-bottom: 5px;">محلل الدوال الرياضي 📈</h2>
        <small>ثانوية الذرى للمتميزين</small>
    </div>

    <div class="card animate__animated animate__zoomIn">
        <label>أدخل الدالة الرياضية:</label>
        <input type="text" id="equation" placeholder="مثال: x^2 or sin(x)" value="x^2">
        <button onclick="draw()">تحديث الرسم البياني</button>
        <div id="plot"></div>
    </div>

    <div class="footer animate__animated animate__fadeInUp">
        <p>جميع الحقوق محفوظة © لـ <b>ثانوية الذرى للمتميزين</b></p>
        <p>برمجة الطالب: <b>محمد علي براء</b></p>
        <p>بإشراف: أ. محمد سمير | أ. محمد زكي | د. علي خالد</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function draw() {
            const eq = document.getElementById('equation').value;
            try {
                functionPlot({
                    target: '#plot',
                    width: document.getElementById('plot').clientWidth,
                    height: 300,
                    grid: true,
                    data: [{ fn: eq, color: '#6c5ce7' }]
                });
                tg.HapticFeedback.impactOccurred('light');
            } catch (err) {
                alert("يرجى كتابة الدالة بشكل صحيح باستخدام x");
            }
        }
        window.onload = draw;
        window.onresize = draw;
    </script>
</body>
</html>
