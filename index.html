<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الراسم البياني - ثانوية الذرى</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot@1/dist/function-plot.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; }
        body {
            margin: 0; padding: 0; background: #0f0c29; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-y: auto; /* السماح بالتمرير */
        }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .container { width: 95%; max-width: 500px; padding: 20px 10px; z-index: 1; flex-grow: 1; }
        .header { text-align: center; margin-bottom: 20px; }
        
        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* تحسين مظهر صندوق الرسم */
        #plot { 
            width: 100%; height: 320px; background: #ffffff; 
            border-radius: 12px; margin: 15px 0; border: 2px solid #000;
        }

        /* تلوين محاور الرسم والتدريجات بالأسود عبر CSS */
        .function-plot .axis line, .function-plot .axis path { stroke: #000 !important; stroke-width: 1.5px; }
        .function-plot .grid line { stroke: #ddd !important; }
        .function-plot .origin { stroke: #000 !important; stroke-width: 2px; }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.2); color: #fff; font-size: 1.3rem;
            text-align: left; direction: ltr; margin-bottom: 15px; outline: none;
            box-sizing: border-box; border-bottom: 3px solid var(--primary);
        }

        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .keyboard button {
            padding: 15px 5px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.12); color: white; font-size: 1rem;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .keyboard button:active { background: var(--primary); transform: scale(0.92); }
        .btn-draw { background: #2ecc71 !important; grid-column: span 2; color: #000 !important; }
        .btn-clear { background: #e74c3c !important; }

        .footer {
            width: 100%; padding: 30px 10px; text-align: center;
            background: rgba(0,0,0,0.7); border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px; z-index: 1; box-sizing: border-box;
        }
        .names-box { margin: 15px 0; padding: 10px; border-radius: 10px; background: rgba(108, 92, 231, 0.1); border: 1px solid var(--primary); }
        b { color: #a29bfe; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 1.8rem;">الراسم البياني 📈</h1>
            <p style="margin:5px 0; opacity: 0.8;">ثانوية الذرى للمتميزين</p>
        </div>

        <div class="card">
            <input type="text" id="equation" value="x^2" readonly>
            <div id="plot"></div>
            
            <div class="keyboard">
                <button onclick="press('sin(')">sin</button><button onclick="press('cos(')">cos</button><button onclick="press('tan(')">tan</button><button onclick="press('log(')">log</button><button onclick="press('exp(')">exp</button>
                <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('/')">/</button><button onclick="press('(')">(</button>
                <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('*')">×</button><button onclick="press(')')">)</button>
                <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('-')">-</button><button onclick="press('^')">^</button>
                <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="press('x')">x</button><button onclick="press('+')">+</button><button onclick="backspace()">⌫</button>
                <button class="btn-clear" onclick="clearAll()">C</button>
                <button class="btn-draw" onclick="updatePlot()">رسم الدالة</button>
                <button onclick="press('sqrt(')">√</button><button onclick="press('PI')">π</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>جميع الحقوق محفوظة © لـ <b>ثانوية الذرى للمتميزين</b></p>
        <div class="names-box">
            <p>تمت البرمجة بواسطة الطلاب:</p>
            <p style="font-size: 1.1rem;"><b>محمدعلي براء الربيعي</b> & <b>محمدرضا ضياء حمادي</b></p>
        </div>
        <p>بإشراف الأساتذة:<br>أ. محمد سمير | أ. محمد زكي | د. علي خالد</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // رسم الدالة مع تحسين الوضوح (لون أسود)
        function updatePlot() {
            const eq = document.getElementById('equation').value;
            const plotDiv = document.getElementById('plot');
            try {
                functionPlot({
                    target: '#plot',
                    width: plotDiv.clientWidth,
                    height: 320,
                    grid: true,
                    xAxis: { domain: [-10, 10] },
                    yAxis: { domain: [-10, 10] },
                    data: [{
                        fn: eq,
                        color: '#000000', // لون الدالة أسود غامق
                        graphType: 'polyline',
                        sampler: 'builtIn'
                    }]
                });
                tg.HapticFeedback.impactOccurred('medium');
            } catch (err) {
                alert("تأكد من كتابة الدالة بشكل صحيح.");
            }
        }

        // لوحة المفاتيح
        function press(val) { document.getElementById('equation').value += val; }
        function clearAll() { document.getElementById('equation').value = ''; }
        function backspace() {
            let ev = document.getElementById('equation').value;
            document.getElementById('equation').value = ev.substring(0, ev.length - 1);
        }

        // الخلفية 3D
        function init3D() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg-canvas'), alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            const geo = new THREE.PlaneGeometry(100, 100, 20, 20);
            const mat = new THREE.MeshBasicMaterial({color: 0x6c5ce7, wireframe: true, transparent: true, opacity: 0.1});
            const plane = new THREE.Mesh(geo, mat);
            plane.rotation.x = -Math.PI/2;
            scene.add(plane);
            camera.position.z = 30;
            function animate() { requestAnimationFrame(animate); plane.rotation.z += 0.001; renderer.render(scene, camera); }
            animate();
        }

        window.onload = () => { init3D(); updatePlot(); };
        window.onresize = updatePlot;
    </script>
</body>
</html>
