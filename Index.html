<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemia Smart Project | ثانوية الذرى</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --apple-blur: blur(25px); --apple-bg: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: radial-gradient(circle at top, #111, #000); color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }
        
        /* تصميم الهيدر (Apple Style) */
        .header { position: absolute; top: 30px; width: 100%; text-align: center; z-index: 10; padding: 0 20px; box-sizing: border-box; }
        .badge { background: linear-gradient(135deg, #00d4ff, #0088ff); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; margin-bottom: 8px; box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }
        .header h1 { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1.5px; background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; font-size: 0.95rem; margin-top: 5px; }

        /* البطاقة الزجاجية السفلية */
        .glass-panel {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            background: var(--apple-bg); backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px; padding: 20px; z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .mentor-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; font-size: 0.8rem; text-align: center; }
        .mentor-item { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); }

        /* عرض المجسم 3D للأرتيميا */
        model-viewer { 
            width: 100%; height: 100vh; 
            --poster-color: transparent; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="badge">ثانوية الذرى الذكية للمتميزين - كربلاء</div>
        <h1>Artemia Salina 3D</h1>
        <p>محاكاة البيئة الذكية - معرض العلوم 2026</p>
    </div>

    <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/Sea_Monkey.glb" 
        alt="Artemia Salina 3D Model"
        camera-controls auto-rotate 
        shadow-intensity="1" exposure="1.2" 
        camera-orbit="0deg 75deg 105%" 
        field-of-view="30deg"
        auto-rotate-delay="0"
        interaction-prompt="none">
    </model-viewer>

    <div class="glass-panel">
        <div style="font-size: 0.85rem; color: #888; font-weight: 500;">تطوير المبرمج الموهوب:</div>
        <div style="font-size: 1.6rem; font-weight: 700; margin-bottom: 5px; color: #fff;">محمد علي براء صاحب</div>
        
        <div style="height: 1px; background: rgba(255,255,255,0.08); margin: 15px 0;"></div>
        
        <div style="font-size: 0.85rem; color: #888; font-weight: 500;">بإشراف الأساتذة الأفاضل:</div>
        <div class="mentor-grid">
            <div class="mentor-item">خالد النصراوي</div>
            <div class="mentor-item">حامد النصراوي</div>
            <div class="mentor-item">علي غصن</div>
        </div>
    </div>

</body>
</html>
